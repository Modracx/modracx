<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="Cartoon episode">
  <style>
    .panel{fill:#0d1117;stroke:#c9d1d9;stroke-width:1.5;rx:8}
    .bg{fill:#0f1720}
    .text{fill:#ffd966;font-family:Inter,Arial,sans-serif}
  </style>
  <rect width="100%" height="100%" fill="#071021"/>

  <!-- four panels side by side -->
  <g id="p1" transform="translate(12,20)" opacity="0">
    <rect x="0" y="0" width="188" height="188" rx="10" fill="#071021" stroke="#2b3340"/>
    <!-- character A -->
    <circle cx="48" cy="72" r="20" fill="#ffd966"/>
    <rect x="38" y="92" width="20" height="30" rx="6" fill="#ffffff"/>
    <text x="90" y="65" class="text" font-size="14">Hey, remember 90s cartoons?</text>
  </g>

  <g id="p2" transform="translate(206,20)" opacity="0">
    <rect x="0" y="0" width="188" height="188" rx="10" fill="#071021" stroke="#2b3340"/>
    <!-- character B -->
    <circle cx="48" cy="72" r="20" fill="#ff7b00"/>
    <rect x="38" y="92" width="20" height="30" rx="6" fill="#ffffff"/>
    <text x="90" y="65" class="text" font-size="14">Yeah—full of beeps, boops, and overacting!</text>
  </g>

  <g id="p3" transform="translate(400,20)" opacity="0">
    <rect x="0" y="0" width="188" height="188" rx="10" fill="#071021" stroke="#2b3340"/>
    <!-- action -->
    <rect x="18" y="40" width="152" height="100" rx="6" fill="#0d1117" stroke="#2b3340"/>
    <text x="36" y="100" class="text" font-size="22">WHOOSH!</text>
  </g>

  <g id="p4" transform="translate(594,20)" opacity="0">
    <rect x="0" y="0" width="188" height="188" rx="10" fill="#071021" stroke="#2b3340"/>
    <text x="24" y="90" class="text" font-size="16">And the moral: Always check your props before launch.</text>
  </g>

  <!-- animate panels sequentially -->
  <animate xlink:href="#p1" attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.35;1" dur="12s" repeatCount="indefinite"/>
  <animate xlink:href="#p2" attributeName="opacity" values="0;0;1;0" keyTimes="0;0.25;0.5;1" dur="12s" repeatCount="indefinite"/>
  <animate xlink:href="#p3" attributeName="opacity" values="0;0;0;1" keyTimes="0;0.5;0.75;1" dur="12s" repeatCount="indefinite"/>
  <animate xlink:href="#p4" attributeName="opacity" values="0;0;0;1;0" keyTimes="0;0.75;0.9;0.99;1" dur="12s" repeatCount="indefinite"/>

  <!-- small caption -->
  <text x="20" y="226" fill="#c9d1d9" font-family="Inter,Arial" font-size="12">A tiny cartoon episode — looped SMIL animation friendly to GitHub.</text>
</svg>
