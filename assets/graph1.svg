<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" width="420" height="180" role="img" aria-label="Animated bar chart for monthly signups">
  <style>
    .bg { fill: #071021; }
    .grid { stroke: #30363d; stroke-width: 1; }
    .axis { stroke: #8b949e; stroke-width: 1.2; }
    .label { fill: #c9d1d9; font: 11px Inter, Arial, sans-serif; }
    .title { fill: #ffd966; font: 700 14px Inter, Arial, sans-serif; }
    .value { fill: #ffd966; font: 11px Inter, Arial, sans-serif; }
  </style>

  <rect class="bg" width="420" height="180" rx="12"/>
  <text class="title" x="22" y="24">Monthly signups</text>

  <g transform="translate(24,34)">
    <line class="grid" x1="0" y1="110" x2="350" y2="110"/>
    <line class="grid" x1="0" y1="82" x2="350" y2="82"/>
    <line class="grid" x1="0" y1="54" x2="350" y2="54"/>
    <line class="grid" x1="0" y1="26" x2="350" y2="26"/>
    <line class="axis" x1="0" y1="0" x2="0" y2="110"/>
    <line class="axis" x1="0" y1="110" x2="350" y2="110"/>

    <g class="label">
      <text x="-14" y="114">0</text>
      <text x="-20" y="86">25</text>
      <text x="-20" y="58">50</text>
      <text x="-20" y="30">75</text>
    </g>

    <g>
      <rect x="20" y="110" width="34" height="0" rx="4" fill="#ff7b00">
        <animate attributeName="y" values="110;72;72;110" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;38;38;0" dur="5s" repeatCount="indefinite"/>
      </rect>
      <rect x="86" y="110" width="34" height="0" rx="4" fill="#ffd966">
        <animate attributeName="y" values="110;48;48;110" dur="5s" begin="0.2s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;62;62;0" dur="5s" begin="0.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="152" y="110" width="34" height="0" rx="4" fill="#c9d1d9">
        <animate attributeName="y" values="110;28;28;110" dur="5s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;82;82;0" dur="5s" begin="0.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="218" y="110" width="34" height="0" rx="4" fill="#8b949e">
        <animate attributeName="y" values="110;60;60;110" dur="5s" begin="0.6s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;50;50;0" dur="5s" begin="0.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="284" y="110" width="34" height="0" rx="4" fill="#58a6ff">
        <animate attributeName="y" values="110;38;38;110" dur="5s" begin="0.8s" repeatCount="indefinite"/>
        <animate attributeName="height" values="0;72;72;0" dur="5s" begin="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g class="label">
      <text x="24" y="130">Jan</text>
      <text x="90" y="130">Feb</text>
      <text x="156" y="130">Mar</text>
      <text x="222" y="130">Apr</text>
      <text x="288" y="130">May</text>
    </g>

    <g class="value">
      <text x="26" y="66">28</text>
      <text x="92" y="42">46</text>
      <text x="158" y="22">64</text>
      <text x="224" y="54">40</text>
      <text x="290" y="32">56</text>
    </g>
  </g>
</svg>
