<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" width="420" height="180" role="img" aria-label="Animated line chart for daily active users">
  <style>
    .bg { fill: #071021; }
    .grid { stroke: #30363d; stroke-width: 1; }
    .axis { stroke: #8b949e; stroke-width: 1.2; }
    .label { fill: #c9d1d9; font: 11px Inter, Arial, sans-serif; }
    .title { fill: #ffd966; font: 700 14px Inter, Arial, sans-serif; }
  </style>

  <rect class="bg" width="420" height="180" rx="12"/>
  <text class="title" x="22" y="24">Daily active users</text>

  <g transform="translate(24,34)">
    <line class="grid" x1="0" y1="110" x2="350" y2="110"/>
    <line class="grid" x1="0" y1="82" x2="350" y2="82"/>
    <line class="grid" x1="0" y1="54" x2="350" y2="54"/>
    <line class="grid" x1="0" y1="26" x2="350" y2="26"/>
    <line class="axis" x1="0" y1="0" x2="0" y2="110"/>
    <line class="axis" x1="0" y1="110" x2="350" y2="110"/>

    <path fill="rgba(200,134,10,0.12)" stroke="none">
      <animate attributeName="d" dur="4.8s" repeatCount="indefinite"
        values="M0,110 L0,80 L60,56 L120,68 L180,44 L240,52 L300,36 L300,110 Z;
                M0,110 L0,84 L60,64 L120,58 L180,40 L240,60 L300,44 L300,110 Z;
                M0,110 L0,80 L60,56 L120,68 L180,44 L240,52 L300,36 L300,110 Z"/>
    </path>

    <polyline fill="none" stroke="#58a6ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="points" dur="4.8s" repeatCount="indefinite"
        values="0,80 60,56 120,68 180,44 240,52 300,36;
                0,84 60,64 120,58 180,40 240,60 300,44;
                0,80 60,56 120,68 180,44 240,52 300,36"/>
    </polyline>

    <g fill="#ffd966">
      <circle r="4">
        <animate attributeName="cx" dur="4.8s" repeatCount="indefinite" values="0;0;0"/>
        <animate attributeName="cy" dur="4.8s" repeatCount="indefinite" values="80;84;80"/>
      </circle>
      <circle r="4">
        <animate attributeName="cx" dur="4.8s" repeatCount="indefinite" values="60;60;60"/>
        <animate attributeName="cy" dur="4.8s" repeatCount="indefinite" values="56;64;56"/>
      </circle>
      <circle r="4">
        <animate attributeName="cx" dur="4.8s" repeatCount="indefinite" values="120;120;120"/>
        <animate attributeName="cy" dur="4.8s" repeatCount="indefinite" values="68;58;68"/>
      </circle>
      <circle r="4">
        <animate attributeName="cx" dur="4.8s" repeatCount="indefinite" values="180;180;180"/>
        <animate attributeName="cy" dur="4.8s" repeatCount="indefinite" values="44;40;44"/>
      </circle>
      <circle r="4">
        <animate attributeName="cx" dur="4.8s" repeatCount="indefinite" values="240;240;240"/>
        <animate attributeName="cy" dur="4.8s" repeatCount="indefinite" values="52;60;52"/>
      </circle>
      <circle r="4">
        <animate attributeName="cx" dur="4.8s" repeatCount="indefinite" values="300;300;300"/>
        <animate attributeName="cy" dur="4.8s" repeatCount="indefinite" values="36;44;36"/>
      </circle>
    </g>

    <g class="label">
      <text x="-14" y="114">0</text>
      <text x="-20" y="86">25</text>
      <text x="-20" y="58">50</text>
      <text x="-20" y="30">75</text>
      <text x="-2" y="130">Mon</text>
      <text x="56" y="130">Tue</text>
      <text x="114" y="130">Wed</text>
      <text x="174" y="130">Thu</text>
      <text x="233" y="130">Fri</text>
      <text x="291" y="130">Sat</text>
    </g>
  </g>
</svg>
