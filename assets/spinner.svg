<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="180" height="180" role="img" aria-label="Spinner animation">
  <rect width="100%" height="100%" fill="transparent"/>
  <g transform="translate(60,60)">
    <g stroke="#c8860a" stroke-width="6" stroke-linecap="round" fill="none">
      <path d="M30 0 A30 30 0 1 1 -29.9 0" opacity="0.18"/>
      <path d="M30 0 A30 30 0 0 1 0 -30" opacity="1">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.9s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
