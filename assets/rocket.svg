<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="600" height="360" role="img" aria-label="Rocket animation">
  <defs>
    <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c9d1d9" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- rocket body -->
  <g transform="translate(100,40)">
    <g id="rocket">
      <ellipse cx="0" cy="16" rx="22" ry="10" fill="#e6e6e6" opacity="0.9"/>
      <rect x="-14" y="-28" width="28" height="40" rx="6" fill="#ffffff" stroke="#c9c9c9" stroke-width="1"/>
      <circle cx="0" cy="-8" r="6" fill="#0d1117" />
      <rect x="-18" y="-6" width="6" height="16" rx="2" fill="#d9d9d9"/>
      <rect x="12" y="-6" width="6" height="16" rx="2" fill="#d9d9d9"/>
    </g>

    <!-- animated lift -->
    <animateTransform xlink:href="#rocket" attributeName="transform" type="translate" values="0,30; 0,0; 0,-18; 0,-32" dur="3s" repeatCount="indefinite"/>

    <!-- flame group -->
    <g id="flame" transform="translate(0,34)">
      <path d="M0,0 C6,6 10,18 0,28 C-10,18 -6,6 0,0 Z" fill="#ff7b00" opacity="0.95">
        <animate attributeName="transform" type="scale" values="1 1; 1 1.2; 1 0.9; 1 1" dur="0.45s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.6;0.95" dur="0.4s" repeatCount="indefinite"/>
      </path>
      <path d="M0,6 C3,10 6,18 0,22 C-6,18 -3,10 0,6 Z" fill="#ffd966" opacity="0.85">
        <animate attributeName="transform" type="scale" values="1 1; 1 1.3; 1 1" dur="0.35s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- subtle rising stars -->
  <g fill="#ffd966" opacity="0.6">
    <circle cx="20" cy="18" r="1.2">
      <animate attributeName="cy" values="18;6;18" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="22" r="1.3">
      <animate attributeName="cy" values="22;8;22" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="12" r="1">
      <animate attributeName="cy" values="12;4;12" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
