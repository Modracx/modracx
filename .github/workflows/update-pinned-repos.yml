name: Update pinned repositories

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-pinned-repos.yml"
      - "scripts/update-pinned-repos.mjs"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate pinned repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-pinned-repos.mjs

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "Pinned repositories are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update pinned repositories"
          git push
